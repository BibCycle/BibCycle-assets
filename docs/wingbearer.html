<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="wb-page-title">翼使資源 — BibCycle 翼旅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif:wght@300;400;500;600&family=Noto+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #2a3f5c;
      --amber: #FFD27F;
      --amber-dark: #e8b84b;
      --bg: #f8f6f1;
      --bg-warm: #f2ede4;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --serif: 'Noto Serif TC', serif;
      --sans: 'Noto Sans TC', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); overflow-x: hidden; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 60px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.3s, backdrop-filter 0.3s;
    }
    nav.scrolled { background: rgba(42,63,92,0.96); backdrop-filter: blur(12px); }
    .nav-logo { font-family: var(--serif); font-size: 22px; font-weight: 600; color: #fff; letter-spacing: 0.02em; text-decoration: none; }
    .nav-logo span { color: var(--amber); }
    .nav-right { display: flex; align-items: center; gap: 36px; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; letter-spacing: 0.05em; transition: color 0.2s; }
    .nav-links a:hover { color: var(--amber); }
    .nav-links a.nav-key-link {
      color: var(--amber);
      border: 1px solid rgba(255,210,127,0.42);
      background: rgba(255,210,127,0.12);
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .nav-links a.nav-key-link:hover {
      color: #fff;
      border-color: rgba(255,210,127,0.7);
      background: rgba(255,210,127,0.28);
    }

    .lang-switcher {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      overflow: hidden;
    }
    .lang-btn {
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: var(--sans);
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }
    .lang-btn:hover { color: rgba(255,255,255,0.75); }
    .lang-btn.active { color: var(--amber); background: rgba(255,210,127,0.1); }
    .lang-sep { color: rgba(255,255,255,0.15); font-size: 11px; user-select: none; }
    .wing-term { color: var(--amber); }

    section { padding: 100px 60px; }
    .section-label {
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--amber-dark);
      text-transform: uppercase;
      margin-bottom: 14px;
      font-family: var(--sans);
    }
    .section-title {
      font-family: var(--serif);
      font-size: clamp(30px, 4vw, 48px);
      color: var(--navy);
      line-height: 1.35;
      margin-bottom: 18px;
      font-weight: 500;
    }
    .section-subtitle {
      font-size: 18px;
      line-height: 1.8;
      color: var(--text-muted);
      max-width: 560px;
    }

    .wb-hero {
      background: var(--navy);
      padding: 120px 60px 80px;
      text-align: center;
    }
    .wb-hero-label {
      font-family: var(--sans);
      font-size: 26px;
      letter-spacing: 0.12em;
      color: var(--amber);
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    [data-i18n="wb-identity-label"],
    #wb-res-label,
    #wb-cta-label {
      font-size: 24px;
    }
    .wb-hero-title {
      font-family: var(--serif);
      font-size: clamp(32px, 4vw, 52px);
      color: var(--bg);
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 24px;
    }
    .wb-hero-sub {
      font-size: 18px;
      color: rgba(248,246,241,0.7);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.8;
    }
    .wb-identity {
      background: var(--bg-warm);
      padding: 100px 60px;
      max-width: 720px;
      margin: 0 auto;
    }
    .wb-identity-text {
      font-family: var(--serif);
      font-size: clamp(18px, 2vw, 24px);
      color: var(--navy);
      line-height: 2;
      margin-bottom: 40px;
    }
    .wb-resources {
      background: var(--bg);
      padding: 100px 60px;
    }
    .wb-resources-inner {
      max-width: 800px;
      margin: 0 auto;
    }
    .wb-card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 48px;
    }
    .wb-card {
      background: var(--bg-warm);
      border-radius: 16px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid rgba(42,63,92,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .wb-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(42,63,92,0.1);
    }
    .wb-card-icon { font-size: 28px; }
    .wb-card-title {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 500;
      color: var(--navy);
    }
    .wb-card-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      flex: 1;
    }
    .wb-card-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--amber);
      color: var(--navy);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      width: fit-content;
      margin-top: 8px;
      transition: transform 0.2s;
    }
    .wb-card-btn:hover { transform: translateY(-2px); }
    .wb-card-btn-ghost {
      background: transparent;
      border: 1.5px solid var(--navy);
      color: var(--navy);
    }
    .wb-promo-btn-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }
    .wb-promo-btn-row .wb-card-btn {
      margin-top: 0;
      padding: 10px 14px;
      font-size: 12px;
      white-space: nowrap;
    }
    .wb-coming {
      opacity: 0.5;
      pointer-events: none;
    }
    .wb-tag {
      display: inline-block;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .wb-tag-ready { background: #e8f5e9; color: #2e7d32; }
    .wb-tag-soon { background: #fff3e0; color: #e65100; }

    footer {
      background: #1f3048;
      color: rgba(255,255,255,0.72);
      padding: 46px 60px 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    .footer-brand-wrap { display: flex; flex-direction: column; gap: 8px; }
    .footer-brand { font-family: var(--serif); font-size: 22px; color: #fff; }
    .footer-brand span { color: var(--amber); }
    .footer-links { display: flex; gap: 24px; list-style: none; }
    .footer-links a { font-size: 16px; color: rgba(255,255,255,0.55); text-decoration: none; }
    .footer-tagline { font-size: 14px; }
    .footer-social { display: flex; gap: 12px; }
    .footer-social a { color: #fff; opacity: 0.8; }
    .footer-copyright {
      background: #1a283c;
      color: rgba(255,255,255,0.45);
      text-align: center;
      font-size: 12px;
      padding: 12px;
    }

    @media (max-width: 960px) {
      nav { padding: 16px 24px; }
      .nav-links { display: none; }
      section { padding: 72px 24px; }
      footer { flex-direction: column; gap: 24px; text-align: center; }
    }
    @media (max-width: 640px) {
      .wb-card-grid { grid-template-columns: 1fr; }
      .wb-hero { padding: 100px 24px 60px; }
      .wb-identity { padding: 60px 24px; }
      .wb-resources { padding: 60px 24px; }
      .wb-promo-btn-row { flex-wrap: wrap; }
      .wb-promo-btn-row .wb-card-btn { font-size: 13px; padding: 10px 20px; }
    }
  </style>
</head>

    let activeLang = localStorage.getItem('bibcycle-lang') || 'zh-TW';
    function highlightWingTerm(text) {
      return text.replace(/翼使/g, '<span class="wing-term">翼使</span>');
    }

    function applyLang(lang) {
      activeLang = lang;
      localStorage.setItem('bibcycle-lang', lang);
      const dict = T[lang];
      if (!dict) return;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = dict[key];
        if (val === undefined) return;
        const isZh = lang === 'zh-TW' || lang === 'zh-CN';
        const shouldHighlightWingTerm = isZh && val.includes('翼使') && el.tagName !== 'TITLE';
        if (el.getAttribute('data-i18n-html') === 'true') {
          el.innerHTML = shouldHighlightWingTerm ? highlightWingTerm(val) : val;
        } else if (shouldHighlightWingTerm) {
          el.innerHTML = highlightWingTerm(val);
        } else {
          el.textContent = val;
        }
      });

      document.documentElement.lang = lang === 'zh-TW' ? 'zh-TW' : lang === 'zh-CN' ? 'zh-CN' : 'en';

      const serif = lang === 'en'
        ? "'Noto Serif', serif"
        : (lang === 'zh-CN' ? "'Noto Serif SC', 'Noto Serif TC', serif" : "'Noto Serif TC', serif");
      document.documentElement.style.setProperty('--serif', serif);
      const sans = lang === 'en'
        ? "'Noto Sans', sans-serif"
        : (lang === 'zh-CN' ? "'Noto Sans SC', 'Noto Sans TC', sans-serif" : "'Noto Sans TC', sans-serif");
      document.documentElement.style.setProperty('--sans', sans);

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.getAttribute('data-lang')));
    });

    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60));

    applyLang(activeLang);
  </script>
