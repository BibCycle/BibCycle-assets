  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #2a3f5c;
      --amber: #FFD27F;
      --amber-dark: #e8b84b;
      --bg: #f8f6f1;
      --bg-warm: #f2ede4;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --serif: 'Noto Serif TC', serif;
      --sans: 'Noto Sans TC', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 60px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.3s, backdrop-filter 0.3s;
    }
    nav.scrolled { background: rgba(42,63,92,0.96); backdrop-filter: blur(12px); }

    .nav-logo { font-family: var(--serif); font-size: 22px; font-weight: 600; color: #fff; letter-spacing: 0.02em; }
    .nav-logo span { color: var(--amber); }

    .nav-right { display: flex; align-items: center; gap: 36px; }

    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; letter-spacing: 0.05em; transition: color 0.2s; }
    .nav-links a:hover { color: var(--amber); }

    /* Language switcher */
    .lang-switcher {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      overflow: hidden;
    }
    .lang-btn {
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: var(--sans);
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }
    .lang-btn:hover { color: rgba(255,255,255,0.75); }
    .lang-btn.active { color: var(--amber); background: rgba(255,210,127,0.1); }
    .lang-sep { color: rgba(255,255,255,0.15); font-size: 11px; user-select: none; }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      text-align: center;
      padding: 120px 40px 80px;
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: ''; position: absolute;
      width: 700px; height: 700px; border-radius: 50%;
      border: 1px solid rgba(255,210,127,0.08);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    #hero::after {
      content: ''; position: absolute;
      width: 1000px; height: 1000px; border-radius: 50%;
      border: 1px solid rgba(255,210,127,0.05);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-size: 30px; font-weight: 400; letter-spacing: 0.2em;
      color: var(--amber); margin-bottom: 28px;
      opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
    }
    .hero-title {
      font-family: var(--serif);
      font-size: clamp(40px, 5vw, 72px); font-weight: 500;
      color: #fff; line-height: 1.3; letter-spacing: 0.04em;
      max-width: 720px; margin-bottom: 24px; text-wrap: pretty;
      opacity: 0; animation: fadeUp 0.8s 0.4s forwards;
    }
    .hero-title em { font-style: normal; color: var(--amber); }
    .hero-subtitle {
      font-size: 18px; font-weight: 300;
      color: rgba(255,255,255,0.6); letter-spacing: 0.12em; margin-bottom: 56px;
      opacity: 0; animation: fadeUp 0.8s 0.6s forwards;
      display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
    }
    .hero-subtitle span { display: inline-flex; align-items: center; }
    .hero-subtitle span:not(:last-child)::after { content: '·'; margin: 0 12px; color: #FFD27F; }

    .btn-group {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
      opacity: 0; animation: fadeUp 0.8s 0.8s forwards;
      position: relative; z-index: 2;
    }
    .btn {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 28px; border-radius: 12px; text-decoration: none;
      font-family: var(--sans); font-size: 15px; font-weight: 500; letter-spacing: 0.02em;
      transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border: none;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    .btn-primary { background: var(--amber); color: var(--navy); }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .btn-icon { width: 24px; height: 24px; flex-shrink: 0; }
    .btn-label-sub { font-size: 11px; font-weight: 300; opacity: 0.7; display: block; }

    .btn-coming-soon-wrap {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 28px;
      border-radius: 12px;
      border: 1px dashed rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.35);
      font-family: var(--sans);
      cursor: default;
    }
    .btn-coming-soon-tag {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,210,127,0.6);
      letter-spacing: 0.06em;
    }

    .hero-scroll {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .scroll-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, rgba(255,210,127,0.4), transparent);
      animation: scrollPulse 2s infinite;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
    @keyframes scrollPulse { 0%,100%{opacity:.3} 50%{opacity:.8} }

    /* ── SECTIONS ── */
    section { padding: 100px 60px; }
    .section-label { font-size: 27.5px; font-weight: 400; letter-spacing: 0.25em; color: var(--amber-dark); text-transform: uppercase; margin-bottom: 16px; }
    .section-title { font-family: var(--serif); font-size: clamp(28px, 3vw, 44px); font-weight: 500; color: var(--navy); letter-spacing: 0.03em; line-height: 1.4; margin-bottom: 16px; }
    .section-subtitle { font-size: 16px; font-weight: 300; color: var(--text-muted); line-height: 1.8; max-width: 480px; }
    .section-header { margin-bottom: 64px; }

    /* ── PAIN POINTS ── */
    #pain { background: var(--bg); }
    .pain-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 32px; max-width: 1200px; margin: 0 auto; align-items: stretch; }
    #pain .section-subtitle { max-width: 600px; }
    .pain-card {
      background: #fff; border-radius: 20px; padding: 40px 36px;
      border: 1px solid rgba(42,63,92,0.06);
      border-left: 3px solid #FFD27F;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative; overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
    }
    .pain-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(42,63,92,0.1); }
    .pain-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--amber); transform: scaleX(0); transform-origin: left; transition: transform 0.3s;
    }
    .pain-card:hover::before { transform: scaleX(1); }
    .pain-number { font-family: var(--serif); font-size: 48px; font-weight: 300; color: rgba(42,63,92,0.08); line-height: 1; margin-bottom: 20px; }
    .pain-problem { font-size: 13px; font-weight: 400; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 12px; padding: 6px 12px; background: rgba(42,63,92,0.04); border-radius: 20px; display: inline-block; }
    .pain-title { font-family: var(--serif); font-size: 20px; font-weight: 500; color: var(--navy); margin-bottom: 12px; line-height: 1.5; }
    .pain-desc { font-size: 14px; font-weight: 300; color: var(--text-muted); line-height: 1.9; }
    .pain-solution { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(42,63,92,0.06); display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--navy); font-weight: 400; line-height: 1.7; }
    .solution-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber-dark); flex-shrink: 0; margin-top: 6px; }

    /* ── TESTIMONIALS ── */
    #testimonials { background: var(--bg-warm); }
    .testimonials-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 24px; max-width: 1200px; margin: 0 auto; }
    .testimonials-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }
    .quote-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid rgba(42,63,92,0.08);
      border-left: 3px solid #FFD27F;
      padding: 30px 26px;
      box-shadow: 0 10px 30px rgba(42,63,92,0.06);
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 280px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .quote-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(42,63,92,0.1); }
    .quote-mark {
      font-family: var(--serif);
      font-size: 48px;
      line-height: 1;
      color: #FFD27F;
      display: block;
    }
    .quote-mark-open { align-self: flex-start; margin-bottom: 14px; }
    .quote-mark-close { align-self: flex-end; margin-top: auto; }
    .quote-text {
      font-family: var(--serif);
      color: var(--navy);
      font-size: 32px;
      line-height: 1.8;
      letter-spacing: 0.01em;
      flex: 1;
    }

    /* ── HOW IT WORKS ── */
    #how { background: var(--navy); position: relative; overflow: hidden; }
    #how .section-title { color: #fff; }
    #how .section-subtitle { color: rgba(255,255,255,0.5); }
    #how .section-label { color: var(--amber); }
    .steps-container { display: grid; grid-template-columns: repeat(3,1fr); max-width: 1100px; margin: 0 auto; position: relative; }
    .steps-container::before {
      content: ''; position: absolute;
      top: 56px; left: calc(33.33% - 20px); right: calc(33.33% - 20px);
      height: 1px; background: var(--amber); opacity: 0.2;
    }
    .step { padding: 40px 48px; text-align: center; }
    .step-num { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,210,127,0.12); border: 1px solid rgba(255,210,127,0.25); display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; font-family: var(--serif); font-size: 18px; color: var(--amber); font-weight: 400; }
    .step-title { font-family: var(--serif); font-size: 20px; font-weight: 500; color: #fff; margin-bottom: 14px; letter-spacing: 0.03em; }
    .step-desc { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.5); line-height: 1.9; }

    /* ── SCREENSHOTS ── */
    #screenshots { background: var(--bg-warm); overflow: hidden; }
    .screenshots-wrapper { display: flex; gap: 32px; justify-content: center; align-items: flex-end; padding-top: 20px; }
    .phone-mockup { width: 220px; background: var(--navy); border-radius: 36px; padding: 10px; box-shadow: 0 32px 80px rgba(42,63,92,0.2), 0 4px 16px rgba(42,63,92,0.1); transition: transform 0.4s; flex-shrink: 0; }
    .phone-mockup:hover { transform: translateY(-8px); }
    .phone-mockup.center { transform: scale(1.08) translateY(-16px); }
    .phone-mockup.center:hover { transform: scale(1.08) translateY(-24px); }
    .phone-screen { background: #fff; border-radius: 28px; overflow: hidden; aspect-ratio: 9/19.5; position: relative; }
    .phone-img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center top;
      background: #f3efe7;
    }

    /* Phone screen internals */
    .screen-home { background: var(--navy); padding: 24px 16px 16px; height: 100%; display: flex; flex-direction: column; }
    .screen-home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .screen-logo-sm { font-family: var(--serif); font-size: 14px; color: #fff; font-weight: 500; }
    .screen-logo-sm span { color: var(--amber); }
    .avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,210,127,0.2); border: 1px solid rgba(255,210,127,0.3); }
    .screen-week { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; margin-bottom: 6px; }
    .screen-progress-title { font-size: 13px; color: #fff; font-family: var(--serif); margin-bottom: 10px; }
    .progress-bar-wrap { background: rgba(255,255,255,0.1); border-radius: 4px; height: 4px; margin-bottom: 20px; }
    .progress-bar-fill { height: 100%; border-radius: 4px; background: var(--amber); width: 62%; }
    .reading-list { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .reading-item { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
    .reading-item-left { display: flex; flex-direction: column; gap: 3px; }
    .ri-book { font-size: 10px; color: var(--amber); font-weight: 500; }
    .ri-chapter { font-size: 9px; color: rgba(255,255,255,0.4); }
    .ri-check { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; }
    .ri-check.done { background: var(--amber); color: var(--navy); }
    .ri-check.todo { background: rgba(255,255,255,0.08); color: transparent; border: 1px solid rgba(255,255,255,0.15); }

    .screen-reading { background: #faf8f3; padding: 20px 14px; height: 100%; display: flex; flex-direction: column; }
    .screen-back-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .back-arrow { width: 20px; height: 20px; border-radius: 50%; background: rgba(42,63,92,0.08); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--navy); }
    .screen-book-title { font-family: var(--serif); font-size: 12px; color: var(--navy); font-weight: 500; }
    .verse-block { flex: 1; }
    .verse-ref { font-size: 9px; color: var(--amber-dark); letter-spacing: 0.05em; margin-bottom: 10px; }
    .verse-text { font-family: var(--serif); font-size: 11px; color: #3a3530; line-height: 1.9; }
    .verse-text .highlight { background: rgba(255,210,127,0.35); border-radius: 2px; padding: 0 2px; }
    .screen-actions { display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid rgba(42,63,92,0.06); }
    .action-btn-sm { flex: 1; padding: 8px; border-radius: 8px; background: rgba(42,63,92,0.06); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--navy); }
    .action-btn-sm.primary-sm { background: var(--navy); color: #fff; }

    .screen-plan { background: #fff; padding: 20px 14px; height: 100%; display: flex; flex-direction: column; }
    .plan-title-row { margin-bottom: 8px; }
    .plan-screen-title { font-family: var(--serif); font-size: 14px; color: var(--navy); font-weight: 500; margin-bottom: 4px; }
    .dot-pool-label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 8px; }
    .dot-pool { display: grid; grid-template-columns: repeat(10,1fr); gap: 4px; margin-bottom: 14px; }
    .pool-dot { aspect-ratio: 1; border-radius: 3px; background: rgba(42,63,92,0.1); }
    .pool-dot.read { background: rgba(232,184,75,0.55); }
    .books-overview { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .book-row { display: flex; align-items: center; gap: 8px; }
    .book-name { font-size: 9px; color: var(--navy); width: 36px; flex-shrink: 0; }
    .book-prog-bg { flex: 1; height: 4px; border-radius: 2px; background: rgba(42,63,92,0.08); }
    .book-prog-fill { height: 100%; border-radius: 2px; background: var(--amber-dark); }
    .book-pct { font-size: 8px; color: var(--text-muted); width: 24px; text-align: right; }

    .screenshot-caption { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 20px; letter-spacing: 0.05em; }

    /* ── FAQ ── */

      border: 1px solid rgba(255,210,127,0.22);
      border-radius: 14px;
      overflow: hidden;
    }
    .faq-q {
      cursor: pointer;
      list-style: none;
      padding: 18px 20px;
      color: #fff;
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;

    .faq-q::after {
      content: '+';
      color: var(--amber);
      font-size: 20px;
      line-height: 1;
      flex-shrink: 0;

    .faq-a {
      padding: 0 20px 18px;
      color: rgba(255,255,255,0.72);
      font-size: 15px;
      line-height: 1.8;

    /* ── VIDEO ── */

      position: relative;

      content: '';
      position: absolute;
      top: 50%; transform: translateY(-50%);
      left: -4px; width: 4px; height: 40px;
      background: #1e3450;
      border-radius: 2px 0 0 2px;
    }
    .video-phone-bezel::after {
      content: '';
      position: absolute;
      top: 50%; transform: translateY(-50%);
      right: -4px; width: 4px; height: 40px;
      background: #1e3450;
      border-radius: 0 2px 2px 0;

    .video-player {
      width: 100%;
      border-radius: 22px;
      display: block;
      background: #0d1820;
      outline: none;

      color: rgba(255,255,255,0.35);

    .footer-brand span { color: var(--amber); }

    .footer-links a { font-size: 13px; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: rgba(255,255,255,0.8); }
    .footer-social a { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); text-decoration: none; transition: background 0.2s, color 0.2s; }

    .tweak-row input[type="checkbox"] { width: 16px; height: 16px; }

      align-items: center;

      grid-template-rows: auto auto auto;
      gap: 16px;
      align-items: start;

  // ─── i18n engine ─────────────────────────────────────────────────
  let currentLang = localStorage.getItem('bibcycle-lang') || 'zh-TW';

  function applyLang(lang) {
    currentLang = lang;
    localStorage.setItem('bibcycle-lang', lang);
    const dict = T[lang];
    if (!dict) return;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const val = dict[key];
      if (val === undefined) return;
      if (el.getAttribute('data-i18n-html') === 'true') {
        el.innerHTML = val;
      } else {
        el.textContent = val;
      }
    });

    // Update html lang attr
    document.documentElement.lang = lang === 'zh-TW' ? 'zh-TW' : lang === 'zh-CN' ? 'zh-CN' : 'en';

    // Update font for English
    const serif = lang === 'en'
      ? "'Noto Serif', serif"
      : (lang === 'zh-CN' ? "'Noto Serif SC', 'Noto Serif TC', serif" : "'Noto Serif TC', serif");
    document.documentElement.style.setProperty('--serif', serif);
    const sans = lang === 'en'
      ? "'Noto Sans', sans-serif"
      : (lang === 'zh-CN' ? "'Noto Sans SC', 'Noto Sans TC', sans-serif" : "'Noto Sans TC', sans-serif");
    document.documentElement.style.setProperty('--sans', sans);

    // Update switcher buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLang(btn.getAttribute('data-lang')));
  });

  // ─── Dot pool ────────────────────────────────────────────────────
  (function() {
    const pool = document.getElementById('dot-pool');
    if (!pool) return;
    const total = 40, readCount = 8;
    const indices = new Set();
    while (indices.size < readCount) indices.add(Math.floor(Math.random() * total));
    for (let i = 0; i < total; i++) {
      const d = document.createElement('div');
      d.className = 'pool-dot' + (indices.has(i) ? ' read' : '');
      pool.appendChild(d);
    }
  })();

  // ─── Nav scroll ──────────────────────────────────────────────────
  const nav = document.getElementById('main-nav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60));

  // ─── Scroll reveal ───────────────────────────────────────────────
  const revealEls = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
  revealEls.forEach(el => observer.observe(el));

  // ─── Tweaks ──────────────────────────────────────────────────────
  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';
    else if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  function adjustColor(hex, amount) {
    const r = Math.max(0, Math.min(255, parseInt(hex.slice(1,3),16)+amount));
    const g = Math.max(0, Math.min(255, parseInt(hex.slice(3,5),16)+amount));
    const b = Math.max(0, Math.min(255, parseInt(hex.slice(5,7),16)+amount));
    return `rgb(${r},${g},${b})`;
  }

  document.getElementById('tw-primary').addEventListener('input', function() {
    document.documentElement.style.setProperty('--navy', this.value);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { primaryColor: this.value } }, '*');
  });
  document.getElementById('tw-accent').addEventListener('input', function() {
    document.documentElement.style.setProperty('--amber', this.value);
    document.documentElement.style.setProperty('--amber-dark', adjustColor(this.value, -30));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: this.value } }, '*');
  });
  document.getElementById('tw-bg').addEventListener('input', function() {
    document.documentElement.style.setProperty('--bg', this.value);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { bgColor: this.value } }, '*');
  });
  document.getElementById('tw-font').addEventListener('change', function() {
    document.documentElement.style.setProperty('--serif', `'${this.value}', serif`);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { headingFont: this.value } }, '*');
  });
  document.getElementById('tw-scroll-anim').addEventListener('change', function() {
    document.querySelectorAll('.reveal').forEach(el => {
      el.style.transition = this.checked ? 'opacity 0.7s ease, transform 0.7s ease' : 'none';
    });
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { showScrollAnim: this.checked } }, '*');
  });

  // ─── Init ────────────────────────────────────────────────────────
  (function() {
    const lightbox = document.getElementById('img-lightbox');
    const lightboxImg = document.getElementById('img-lightbox-content');
    const cardImgs = document.querySelectorAll('#card-showcase .card-img');
    if (!lightbox || !lightboxImg || !cardImgs.length) return;

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImg.removeAttribute('src');
    }

    cardImgs.forEach((img) => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt || '';
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
      });
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
    });
  })();

  applyLang(currentLang);
  </script>
