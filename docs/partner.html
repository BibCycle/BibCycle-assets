      'nav-intro':      '介绍影片',
      'nav-video':      '介绍影片',
      'nav-mission':    '使命',
      'nav-become':     '成为翼使',

      'nav-download':   '下载',

      'nav-partner':    'Churches & Orgs',
      'partner-s1-anchor': 'A quiet Bible-reading app, and a card you can hand to someone.',

    }
  };

  let currentLang = localStorage.getItem('bibcycle-lang') || 'zh-TW';

  function setLang(lang) {
    applyLang(lang);
  }

  function highlightWingTerm(text) {
    return text.replace(/翼使/g, '<span class="wing-term">翼使</span>');
  }

  function applyLang(lang) {
    currentLang = lang;
    localStorage.setItem('bibcycle-lang', lang);
    const dict = T[lang];
    if (!dict) return;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const val = dict[key];
      if (val === undefined) return;
      const isZh = lang === 'zh-TW' || lang === 'zh-CN';
      const shouldHighlightWingTerm = isZh
        && val.includes('翼使')
        && el.tagName !== 'TITLE';
      if (el.getAttribute('data-i18n-html') === 'true') {
        el.innerHTML = shouldHighlightWingTerm ? highlightWingTerm(val) : val;
      } else if (shouldHighlightWingTerm) {
        el.innerHTML = highlightWingTerm(val);
      } else {
        el.textContent = val;
      }
    });

    // Update html lang attr
    document.documentElement.lang = lang === 'zh-TW' ? 'zh-TW' : lang === 'zh-CN' ? 'zh-CN' : 'en';

    // Update font for English
    const serif = lang === 'en'
      ? "'Noto Serif', serif"
      : (lang === 'zh-CN' ? "'Noto Serif SC', 'Noto Serif TC', serif" : "'Noto Serif TC', serif");
    document.documentElement.style.setProperty('--serif', serif);
    const sans = lang === 'en'
      ? "'Noto Sans', sans-serif"
      : (lang === 'zh-CN' ? "'Noto Sans SC', 'Noto Sans TC', sans-serif" : "'Noto Sans TC', sans-serif");
    document.documentElement.style.setProperty('--sans', sans);

    // Update active class on top-nav-right spans
    const spans = document.querySelectorAll('.top-nav-right span');
    spans.forEach(span => {
      const onclickAttr = span.getAttribute('onclick');
      if (onclickAttr && onclickAttr.includes(lang)) {
        span.style.color = 'var(--amber)';
        span.style.fontWeight = '500';
      } else {
        span.style.color = 'rgba(255,255,255,0.6)';
        span.style.fontWeight = 'normal';
      }
    });
  }

  // Run on load
  applyLang(currentLang);

  // ─── Lightbox ────────────────────────────────────────────────────
  (function() {
    const lightbox = document.getElementById('img-lightbox');
    const lightboxImg = document.getElementById('img-lightbox-content');
    const clickableImgs = document.querySelectorAll('.partner-image');
    if (!lightbox || !lightboxImg || !clickableImgs.length) return;

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImg.removeAttribute('src');
    }

    clickableImgs.forEach((img) => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt || '';
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
      });
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
    });
  })();
  </script>
